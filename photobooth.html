<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Photobooth — ITSpecta</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --booth-bg: #050510;
      --booth-card: #0a0a20;
    }
    .booth-section {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 80px 20px 40px;
      background: var(--booth-bg);
      position: relative; overflow: hidden;
    }
    .booth-bg-blur {
      position: absolute; width: 400px; height: 400px;
      background: radial-gradient(circle, var(--purple), transparent 70%);
      filter: blur(80px); opacity: 0.2; pointer-events: none;
    }

    .booth-container {
      width: 100%; max-width: 1200px;
      display: grid; grid-template-columns: 1fr 400px; gap: 30px;
      z-index: 1; align-items: start;
    }
    
    @media (max-width: 1000px) {
      .booth-container { grid-template-columns: 1fr; gap: 20px; }
      .camera-wrap { order: -1; }
      .booth-sidebar { padding: 20px; }
      .booth-section { padding-top: 70px; }
    }

    .camera-box {
      background: #000; border: 2px solid var(--border);
      border-radius: 24px; position: relative; overflow: hidden;
      aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      width: 100%;
    }
    #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    
    .countdown-overlay {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4); font-size: 100px; font-weight: 900;
      color: #fff; text-shadow: 0 0 30px var(--purple);
      z-index: 10; pointer-events: none;
    }
    .flash-overlay {
      position: absolute; inset: 0; background: #fff;
      opacity: 0; pointer-events: none; z-index: 20;
    }
    .flash-active { animation: flashAnim 0.3s ease-out; }
    @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

    .booth-sidebar {
      background: var(--booth-card); border: 1px solid var(--border);
      border-radius: 24px; padding: 28px; display: flex; flex-direction: column; gap: 20px;
      position: sticky; top: 90px;
    }
    .sidebar-section { margin-bottom: 0px; }
    .sidebar-title { font-size: 15px; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: #fff; }
    
    .selector-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .selector-item {
      aspect-ratio: 1/1; border-radius: 12px; border: 2px solid transparent;
      cursor: pointer; background: #151530; transition: 0.2s;
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      gap: 4px; font-size: 18px; color: var(--text3);
    }
    .selector-item.active { border-color: var(--purple); background: rgba(124,58,237,0.15); color: var(--purple-l); }
    .selector-item span { font-size: 8px; font-weight: 700; text-transform: uppercase; }
    
    .action-group { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
    .btn-capture {
      width: 100%; padding: 18px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      color: #fff; font-size: 17px; font-weight: 800; cursor: pointer;
      transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 10px 20px rgba(124,58,237,0.3);
    }
    .btn-import {
      width: 100%; padding: 15px; border-radius: 14px; border: 1px dashed var(--border);
      background: rgba(255,255,255,0.03); color: var(--text2); font-size: 14px; font-weight: 600;
      cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-import:hover { background: rgba(255,255,255,0.08); border-color: var(--text3); }

    .result-overlay {
      position: fixed; inset: 0; background: rgba(3,3,10,0.98);
      z-index: 2000; display: none; padding: 20px; overflow-y: auto;
      align-items: center; justify-content: center; backdrop-filter: blur(15px);
    }
    .result-content {
      display: flex; gap: 40px; align-items: center; max-width: 1100px; width: 100%;
    }
    @media (max-width: 900px) {
      .result-content { flex-direction: column; padding-top: 60px; gap: 30px; }
      #result-canvas { width: 100% !important; max-width: 320px !important; }
      .result-actions h2 { font-size: 32px !important; }
    }
    #result-canvas {
      height: auto; border-radius: 8px;
      box-shadow: 0 30px 100px rgba(0,0,0,0.9);
      background: #fff;
    }
    .result-actions { flex: 1; display: flex; flex-direction: column; gap: 12px; }

    .status-dots { display: flex; gap: 8px; justify-content: center; margin-top: 15px; min-height: 10px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: 0.3s; }
    .dot.active { background: var(--pink); box-shadow: 0 0 15px var(--pink); transform: scale(1.2); }
    
    #fileInput { display: none; }
  </style>
</head>
<body>

<nav class="navbar scrolled">
  <div class="nav-container">
    <div class="nav-brand" onclick="location.href='index.html'">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Multimedia</span>
        <span class="brand-org">Photobooth</span>
      </div>
    </div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Kembali</a></li>
    </ul>
  </div>
</nav>

<section class="booth-section">
  <div class="booth-bg-blur" style="top:-100px; left:-100px;"></div>
  <div class="booth-bg-blur" style="bottom:-100px; right:-100px; background:radial-gradient(circle, var(--pink), transparent 70%);"></div>

  <div class="booth-container">
    <div class="camera-wrap">
      <div class="camera-box">
        <video id="video" autoplay playsinline></video>
        <div class="countdown-overlay" id="countdown">3</div>
        <div class="flash-overlay" id="flash"></div>
      </div>
      <div class="status-dots" id="statusDots"></div>
    </div>

    <aside class="booth-sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">📏 Kisi Foto</div>
        <div class="selector-grid" id="gridSelector">
          <div class="selector-item active" data-grid="1x3">🎞️<span>Strip 3</span></div>
          <div class="selector-item" data-grid="1x2">🎞️<span>Strip 2</span></div>
          <div class="selector-item" data-grid="2x2">🔳<span>Grid 4</span></div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-title">✨ Tema Frame</div>
        <div class="selector-grid" id="frameSelector">
          <div class="selector-item active" data-frame="checkered">🏁<span>Grid</span></div>
          <div class="selector-item" data-frame="polkadot">🔵<span>Dots</span></div>
          <div class="selector-item" data-frame="flowers">🌻<span>Bloom</span></div>
          <div class="selector-item" data-frame="neon">🌈<span>Neon</span></div>
          <div class="selector-item" data-frame="minimal">🫧<span>Soft</span></div>
          <div class="selector-item" data-frame="wavy">〰️<span>Wave</span></div>
        </div>
      </div>

      <div class="action-group">
        <button id="btnStart" class="btn-capture">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          Mulai Kamera
        </button>
        <input type="file" id="fileInput" multiple accept="image/*">
        <button id="btnImport" class="btn-import">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Impor dari Galeri
        </button>
      </div>
    </aside>
  </div>
</section>

<div class="result-overlay" id="resultOverlay">
  <div class="result-content">
    <canvas id="result-canvas"></canvas>
    <div class="result-actions">
      <h2 style="font-size: 42px; font-weight: 900; line-height: 1.1; margin-bottom: 5px;">Momen Keren!</h2>
      <p style="color: var(--text2); font-size: 15px; margin-bottom: 15px; line-height: 1.5;">Strip foto kamu sudah siap dengan desain presisi dan estetik.</p>
      
      <button class="btn-capture" id="btnDownload" style="padding: 22px;">Simpan ke Galeri</button>
      <button class="btn-primary" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:16px; border-radius:14px; font-weight: 700;" onclick="resetBooth()">Ambil Ulang</button>
    </div>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  const resultCanvas = document.getElementById('result-canvas');
  const countdownEl = document.getElementById('countdown');
  const flashEl = document.getElementById('flash');
  const btnStart = document.getElementById('btnStart');
  const btnImport = document.getElementById('btnImport');
  const fileInput = document.getElementById('fileInput');
  const btnDownload = document.getElementById('btnDownload');
  const resultOverlay = document.getElementById('resultOverlay');
  const statusDots = document.getElementById('statusDots');
  
  let capturedPhotos = [];
  let currentFrame = 'checkered';
  let currentGrid = '1x3';

  const FRAME_CONFIG = {
    checkered: { bg: '#fff', accent: '#7c3aed', type: 'grid', stickers: ['⭐', '✨', '⚡', '🌈', '💎'] },
    polkadot: { bg: '#ffe4e6', accent: '#fb7185', type: 'dots', stickers: ['🧸', '🎀', '🍭', '🍓', '🍰'] },
    wavy: { bg: '#ddd6fe', accent: '#7c3aed', type: 'wave', stickers: ['🌊', '🫧', '💎', '🧜‍♀️', '🎐'] },
    flowers: { bg: '#fef3c7', accent: '#fbbf24', type: 'flower', stickers: ['🌻', '🌿', '🦋', '🐝', '🌷'] },
    neon: { bg: '#050510', accent: '#ec4899', type: 'neon', stickers: ['🌈', '🔥', '🤟', '🚀', '👽'] },
    minimal: { bg: '#f1f5f9', accent: '#94a3b8', type: 'minimal', stickers: ['☁️', '❄️', '🕊️', '✉️', '🍵'] }
  };

  async function initCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } 
      });
      video.srcObject = stream;
    } catch (err) { alert('Akses kamera gagal! Silakan gunakan tombol impor jika kamera tidak tersedia.'); }
  }

  function setupSelector(id, callback) {
    document.querySelectorAll(`#${id} .selector-item`).forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll(`#${id} .selector-item`).forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        callback(item.dataset[id.replace('Selector', '')]);
      });
    });
  }

  setupSelector('gridSelector', val => { currentGrid = val; updateDots(); });
  setupSelector('frameSelector', val => { currentFrame = val; });

  function updateDots() {
    const count = parseInt(currentGrid.split('x')[0]) * parseInt(currentGrid.split('x')[1]);
    statusDots.innerHTML = Array(count).fill('<div class="dot"></div>').join('');
  }
  updateDots();

  btnStart.addEventListener('click', async () => {
    capturedPhotos = []; btnStart.disabled = true;
    const count = parseInt(currentGrid.split('x')[0]) * parseInt(currentGrid.split('x')[1]);
    const dots = statusDots.querySelectorAll('.dot');
    dots.forEach(d => d.classList.remove('active'));
    for(let i=0; i<count; i++) {
      await startCountdown();
      capturePhoto();
      dots[i].classList.add('active');
      await new Promise(r => setTimeout(r, 800));
    }
    generateFinalResult();
    btnStart.disabled = false;
  });

  btnImport.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    const count = parseInt(currentGrid.split('x')[0]) * parseInt(currentGrid.split('x')[1]);
    if(files.length < count) return alert(`Silakan pilih minimal ${count} foto untuk kisi ini.`);
    
    capturedPhotos = [];
    for(let i=0; i<count; i++) {
      const dataUrl = await readFile(files[i]);
      capturedPhotos.push(dataUrl);
    }
    generateFinalResult();
  });

  function readFile(file) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  function startCountdown() {
    return new Promise(resolve => {
      let count = 3; countdownEl.textContent = count; countdownEl.style.display = 'flex';
      const t = setInterval(() => {
        count--; if(count === 0) { clearInterval(t); countdownEl.style.display = 'none'; resolve(); }
        else countdownEl.textContent = count;
      }, 700);
    });
  }

  function capturePhoto() {
    flashEl.classList.add('flash-active'); setTimeout(() => flashEl.classList.remove('flash-active'), 300);
    const ctx = canvas.getContext('2d');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0);
    capturedPhotos.push(canvas.toDataURL('image/jpeg', 0.95));
  }

  function generateFinalResult() {
    const ctx = resultCanvas.getContext('2d');
    const [cols, rows] = currentGrid.split('x').map(Number);
    const theme = FRAME_CONFIG[currentFrame];
    const photoW = 600, photoH = photoW * (3/4), padding = 60, gap = 30, brandingH = 120;
    resultCanvas.width = (photoW * cols) + (gap * (cols - 1)) + (padding * 2);
    resultCanvas.height = (photoH * rows) + (gap * (rows - 1)) + (padding * 2) + brandingH;

    const previewScale = (window.innerWidth < 900 ? 300 : 400) / resultCanvas.width;
    resultCanvas.style.width = (resultCanvas.width * previewScale) + 'px';

    ctx.fillStyle = theme.bg; ctx.fillRect(0, 0, resultCanvas.width, resultCanvas.height);
    drawPattern(ctx, theme, resultCanvas.width, resultCanvas.height);

    let loadedCount = 0;
    capturedPhotos.forEach((src, i) => {
      const img = new Image();
      img.onload = () => {
        const r = Math.floor(i / cols), c = i % cols;
        const x = padding + (c * (photoW + gap)), y = padding + (r * (photoH + gap));
        ctx.strokeStyle = theme.accent + '22'; ctx.lineWidth = 20;
        drawRoundedRect(ctx, x - 15, y - 15, photoW + 30, photoH + 30, 35, false, true);
        ctx.strokeStyle = theme.accent; ctx.lineWidth = 6;
        drawRoundedRect(ctx, x - 5, y - 5, photoW + 10, photoH + 10, 25, false, true);
        ctx.save();
        drawRoundedRect(ctx, x, y, photoW, photoH, 20, true, false);
        ctx.clip();
        drawImageCover(ctx, img, x, y, photoW, photoH);
        ctx.restore();
        drawAestheticStickers(ctx, x, y, photoW, photoH, theme.stickers);
        loadedCount++;
        if(loadedCount === capturedPhotos.length) finalizeCanvas(ctx, theme);
      };
      img.src = src;
    });
  }

  function drawImageCover(ctx, img, x, y, w, h) {
    const imgRatio = img.width / img.height;
    const targetRatio = w / h;
    let sx, sy, sw, sh;
    if (imgRatio > targetRatio) { sh = img.height; sw = sh * targetRatio; sx = (img.width - sw) / 2; sy = 0; }
    else { sw = img.width; sh = sw / targetRatio; sx = 0; sy = (img.height - sh) / 2; }
    ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
  }

  function drawPattern(ctx, theme, w, h) {
    ctx.save(); ctx.globalAlpha = 0.15; ctx.fillStyle = theme.accent;
    if(theme.type === 'grid') for(let x=0; x<w; x+=60) for(let y=0; y<h; y+=60) if((x+y)%120===0) ctx.fillRect(x,y,60,60);
    else if(theme.type === 'dots') for(let x=0; x<w; x+=80) for(let y=0; y<h; y+=80) { ctx.beginPath(); ctx.arc(x,y,15,0,Math.PI*2); ctx.fill(); }
    else if(theme.type === 'wave') { ctx.strokeStyle = theme.accent; ctx.lineWidth = 6; for(let y=0; y<h; y+=60) { ctx.beginPath(); for(let x=0; x<w; x+=15) ctx.lineTo(x, y + Math.sin(x/40)*15); ctx.stroke(); } }
    else if(theme.type === 'flower') { ctx.font = '40px Arial'; for(let x=0; x<w; x+=120) for(let y=0; y<h; y+=120) ctx.fillText('🌸', x + (y%240===0?60:0), y); }
    ctx.restore();
  }

  function drawAestheticStickers(ctx, x, y, w, h, stickers) {
    ctx.font = '55px Arial';
    ctx.save(); ctx.translate(x + 20, y + 20); ctx.rotate(-0.2); ctx.fillText(stickers[0], 0, 0); ctx.restore();
    ctx.save(); ctx.translate(x + w - 50, y + h - 15); ctx.rotate(0.2); ctx.fillText(stickers[1], 0, 0); ctx.restore();
  }

  function drawRoundedRect(ctx, x, y, w, h, r, fill, stroke) {
    ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath(); if(fill) ctx.fill(); if(stroke) ctx.stroke();
  }

  function finalizeCanvas(ctx, theme) {
    ctx.fillStyle = theme.type === 'neon' ? '#fff' : '#333';
    ctx.font = 'bold 38px Outfit'; ctx.textAlign = 'center';
    ctx.fillText('MULTIMEDIA ITSPECTA', resultCanvas.width/2, resultCanvas.height - 80);
    ctx.font = '24px Outfit'; ctx.globalAlpha = 0.5;
    ctx.fillText('✨ ' + new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'}) + ' ✨', resultCanvas.width/2, resultCanvas.height - 35);
    resultOverlay.style.display = 'flex';
  }

  function resetBooth() { resultOverlay.style.display = 'none'; updateDots(); }
  btnDownload.addEventListener('click', () => {
    const l = document.createElement('a'); l.download = `photobooth_${Date.now()}.jpg`;
    l.href = resultCanvas.toDataURL('image/jpeg', 0.98); l.click();
  });
  initCamera();
</script>
</body>
</html>
