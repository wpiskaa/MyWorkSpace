<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Game — ITSpecta</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --fever-color: #ff0055;
      --fever-shadow: 0 0 30px rgba(255, 0, 85, 0.6);
      --bg-dark: #03030b;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --purple-glow: 0 0 20px rgba(124, 58, 237, 0.3);
    }
    
    * { font-family: 'Plus Jakarta Sans', sans-serif; }

    body {
      background: var(--bg-dark);
      margin: 0; padding: 0;
      color: #fff;
      overflow: hidden;
    }

    /* ANIMATED BACKGROUND */
    .bg-visuals {
      position: fixed; inset: 0; z-index: -1;
      background: var(--bg-dark);
      overflow: hidden;
    }
    .bg-glow {
      position: absolute; width: 600px; height: 600px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: floatBg 20s infinite alternate;
    }
    .bg-glow-1 { background: #7c3aed; top: -10%; left: -10%; }
    .bg-glow-2 { background: #db2777; bottom: -10%; right: -10%; animation-delay: -5s; }
    @keyframes floatBg {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(100px, 50px) scale(1.2); }
    }

    .game-section {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 100px 16px 40px;
      touch-action: none;
      position: relative;
    }

    #particleCanvas {
      position: absolute; inset: 0; pointer-events: none; z-index: 10;
    }

    .game-layout {
      display: flex; gap: 40px; width: 100%; max-width: 1100px;
      justify-content: center; align-items: flex-start;
      z-index: 20;
    }

    .game-board-container {
      width: 100%; max-width: 440px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    
    /* FEVER MODE EFFECT */
    .fever-active .grid {
      border-color: var(--fever-color) !important;
      box-shadow: 0 0 50px rgba(255,0,85,0.3), inset 0 0 20px rgba(255,0,85,0.1) !important;
      animation: feverPulse 0.4s infinite alternate;
    }
    @keyframes feverPulse {
      from { transform: scale(1); filter: brightness(1); }
      to { transform: scale(1.03); filter: brightness(1.2); }
    }

    .grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
      background: rgba(255,255,255,0.02); padding: 20px; border-radius: 28px;
      width: 100%; aspect-ratio: 1/1; border: 1px solid var(--glass-border);
      box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
      position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(10px);
    }

    .cell {
      background: rgba(255,255,255,0.03); border-radius: 10px;
      transition: all 0.2s; position: relative;
    }
    .cell.filled { 
      border: 1px solid rgba(255,255,255,0.4); 
      background-color: var(--cell-color) !important; 
      box-shadow: inset 0 0 15px rgba(255,255,255,0.3), 0 8px 16px rgba(0,0,0,0.4); 
    }
    .cell.preview { 
      opacity: 0.5; background-color: var(--cell-color) !important; 
      transform: scale(0.92); border: 2.5px dashed rgba(255,255,255,0.7);
    }

    .pieces-container {
      display: flex; gap: 16px; width: 100%; justify-content: center; height: 110px;
      margin-top: 20px;
    }
    .piece-box {
      width: 110px; height: 110px; background: var(--glass);
      border: 1px solid var(--glass-border); border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      cursor: grab; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .piece-box:hover { transform: translateY(-8px) scale(1.05); border-color: var(--purple-l); background: rgba(255,255,255,0.05); }
    .piece-box.dragging { opacity: 0; }

    /* LOBBY UI */
    .overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: radial-gradient(circle at center, #0a0a20 0%, #030308 100%);
      display: flex; align-items: center; justify-content: center;
      transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .overlay.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); filter: blur(30px); }

    .lobby-content {
      display: flex; gap: 40px; align-items: stretch; max-width: 1000px; width: 90%;
    }
    .lobby-form {
      flex: 1.2; background: rgba(15, 15, 30, 0.4); 
      backdrop-filter: blur(40px);
      padding: 60px; border-radius: 40px; border: 1px solid var(--glass-border);
      text-align: center; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
      display: flex; flex-direction: column; justify-content: center;
      position: relative; overflow: hidden;
    }

    .form-input {
      background: rgba(0,0,0,0.4); border: 2px solid var(--glass-border);
      color: #fff; padding: 20px; border-radius: 20px; width: 100%;
      outline: none; transition: 0.3s; font-size: 20px; font-weight: 700;
      text-align: center; margin-top: 10px;
    }
    .form-input:focus { border-color: var(--purple); box-shadow: 0 0 30px rgba(124, 58, 237, 0.2); background: rgba(0,0,0,0.6); }

    .leaderboard-panel {
      width: 360px; background: rgba(255, 255, 255, 0.02); 
      backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border); border-radius: 32px; padding: 32px;
      display: flex; flex-direction: column;
    }
    .lb-header { font-weight: 800; color: #fff; font-size: 20px; margin-bottom: 24px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
    .lb-list { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
    .lb-list::-webkit-scrollbar { width: 4px; }
    .lb-list::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 10px; }
    .lb-item { display: flex; justify-content: space-between; padding: 14px 18px; background: rgba(255,255,255,0.03); border-radius: 16px; font-size: 14px; border: 1px solid transparent; }
    .lb-item.top { border-color: rgba(124, 58, 237, 0.3); background: linear-gradient(90deg, rgba(124, 58, 237, 0.1), transparent); }

    #feverAlert {
      position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-size: 100px; font-weight: 900; color: var(--fever-color); z-index: 100;
      text-shadow: var(--fever-shadow); pointer-events: none;
    }
    #feverAlert.show { animation: feverPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes feverPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    #drag-ghost { position: fixed; pointer-events: none; z-index: 5000; display: none; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6)); }

    @media (max-width: 900px) {
      .game-layout { flex-direction: column; align-items: center; gap: 24px; padding: 0 10px; }
      .game-board-container { max-width: 100%; }
      .grid { gap: 6px; padding: 12px; border-radius: 20px; }
      .cell { border-radius: 6px; }
      .pieces-container { height: 90px; gap: 10px; }
      .piece-box { width: 85px; height: 85px; border-radius: 18px; }
      
      .lobby-content { flex-direction: column; height: auto; padding: 40px 16px; gap: 24px; width: 100%; overflow-y: visible; }
      .lobby-form { padding: 32px 24px; border-radius: 24px; width: 100%; flex: none; }
      .lobby-form h2 { font-size: 28px !important; }
      .leaderboard-panel { width: 100%; border-radius: 24px; padding: 24px; flex: none; }
      
      .game-section { padding-top: 80px; height: auto; min-height: 100vh; overflow-y: auto; }
      
      #feverAlert { font-size: 60px; }
      
      .game-over-content { padding: 32px 24px !important; width: 90% !important; border-radius: 24px !important; }
      .game-over-content h2 { font-size: 32px !important; }
      .game-over-content #finalScoreVal { font-size: 56px !important; }
    }
    
    .game-over-content {
      max-width: 440px; padding: 50px; background: #080812; border: 1px solid var(--glass-border);
      border-radius: 40px; text-align: center; box-shadow: 0 50px 100px rgba(0,0,0,0.8);
      display: flex; flex-direction: column; justify-content: center; backdrop-filter: blur(40px);
    }
  </style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDGnmUH1gxYKqhNEyjacmhXO5JnfbK_xD0",
    authDomain: "peoplepleasuredahsyat.firebaseapp.com",
    projectId: "peoplepleasuredahsyat",
    storageBucket: "peoplepleasuredahsyat.firebasestorage.app",
    messagingSenderId: "1013787661296",
    appId: "1:1013787661296:web:d86ea3ee22eae70f230335"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- PARTICLE SYSTEM ---
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  class Particle {
    constructor(x, y, color) {
      this.x = x; this.y = y;
      this.color = color || '#7c3aed';
      this.size = Math.random() * 6 + 2;
      this.speedX = (Math.random() - 0.5) * 10;
      this.speedY = (Math.random() - 0.5) * 10;
      this.life = 1.0;
      this.decay = Math.random() * 0.04 + 0.02;
    }
    update() {
      this.x += this.speedX; this.y += this.speedY;
      this.life -= this.decay;
      this.size *= 0.95;
    }
    draw() {
      ctx.globalAlpha = this.life;
      ctx.fillStyle = this.color;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
    }
  }

  function createExplosion(x, y, color, count = 20) {
    for(let i=0; i<count; i++) particles.push(new Particle(x, y, color));
  }

  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(animateParticles);
  }
  animateParticles();

  // --- AUDIO RESTORED & IMPROVED ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(freq, type = 'sine', vol = 0.1, duration = 0.2, ramp = true) {
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if(ramp) osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + duration);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  }

  // --- GAME LOGIC ---
  const GRID_SIZE = 6;
  const PIECE_TIERS = {
    easy: [
      {p:[[1]],c:'#4f46e5'}, {p:[[1,1]],c:'#e11d48'}, {p:[[1],[1]],c:'#e11d48'}, 
      {p:[[1,1],[1,0]],c:'#9333ea'}
    ],
    medium: [
      {p:[[1,1],[1,1]],c:'#ea580c'}, {p:[[1,1,1]],c:'#0891b2'}, 
      {p:[[1,1],[0,1]],c:'#c026d3'}, {p:[[1,1,1],[0,1,0]],c:'#059669'},
      {p:[[1,1,1],[1,0,0]],c:'#2563eb'}
    ],
    hard: [
      {p:[[1,1,1],[0,0,1]],c:'#dc2626'}, {p:[[1,1,1],[0,1,0],[0,1,0]],c:'#d97706'},
      {p:[[1,1,1,1]],c:'#10b981'}, {p:[[1,1,1],[1,1,1],[1,1,1]],c:'#ffffff'}
    ]
  };

  let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
  let score = 0, playerName = "", currentPieces = [], selectedIdx = null;
  let isDragging = false, streak = 0, feverMode = false;

  const gridEl = document.getElementById('gameGrid');
  const scoreEl = document.getElementById('curScore');
  const ghost = document.getElementById('drag-ghost');

  window.addEventListener('DOMContentLoaded', initLeaderboard);

  window.startSession = () => {
    const input = document.getElementById('playerName');
    if(!input.value.trim()){ input.classList.add('screen-shake'); setTimeout(()=>input.classList.remove('screen-shake'),300); return; }
    playerName = input.value.trim();
    document.getElementById('nameOverlay').classList.add('hidden');
    document.getElementById('dispName').textContent = playerName;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    initGame();
  };

  function initGame() {
    gridEl.innerHTML = '';
    for(let r=0; r<GRID_SIZE; r++) {
      for(let c=0; c<GRID_SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell'; cell.id = `cell-${r}-${c}`;
        gridEl.appendChild(cell);
      }
    }
    spawnPieces();
  }

  function spawnPieces() {
    currentPieces = [];
    document.getElementById('piecesRow').innerHTML = '';
    let tier = score < 800 ? 'easy' : (score < 2500 ? 'medium' : 'hard');
    const pool = PIECE_TIERS[tier];
    for(let i=0; i<3; i++) {
      const pData = JSON.parse(JSON.stringify(pool[Math.floor(Math.random() * pool.length)]));
      currentPieces.push(pData);
      const box = document.createElement('div');
      box.className = 'piece-box'; box.id = `piece-box-${i}`;
      box.innerHTML = renderMiniPiece(pData.p, pData.c, 20);
      const onStart = (e) => { e.preventDefault(); startDrag(e, i); };
      box.addEventListener('mousedown', onStart);
      box.addEventListener('touchstart', onStart, {passive:false});
      document.getElementById('piecesRow').appendChild(box);
    }
    checkGameOver();
  }

  function renderMiniPiece(p, color, size = 18) {
    const rs = p.length, cs = p[0].length;
    let html = `<div style="display:grid; grid-template-columns:repeat(${cs}, ${size}px); gap:4px;">`;
    for(let r=0; r<rs; r++) {
      for(let c=0; c<cs; c++) html += `<div style="width:${size}px; height:${size}px; border-radius:5px; background:${p[r][c]?color:'transparent'}; border:${p[r][c]?'1px solid rgba(255,255,255,0.2)':'none'}"></div>`;
    }
    return html + '</div>';
  }

  function startDrag(e, idx) {
    isDragging = true; selectedIdx = idx;
    const p = currentPieces[idx].p;
    ghost.innerHTML = renderMiniPiece(p, currentPieces[idx].c, 34);
    ghost.style.display = 'block';
    document.getElementById(`piece-box-${idx}`).classList.add('dragging');
    updateDragPos(e);
  }

  function updateDragPos(e) {
    if(!isDragging) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    
    // GHOST VISUAL POSITION (Always centered on cursor/finger)
    const visualOffsetY = e.touches ? -110 : -60;
    ghost.style.left = (x - ghost.offsetWidth / 2) + 'px';
    ghost.style.top = (y + visualOffsetY - ghost.offsetHeight / 2) + 'px';
    
    clearPreviews();
    
    // ACCURACY FIX: Find top-left cell based on where the CENTER of the ghost is
    const rect = gridEl.getBoundingClientRect();
    const cellW = rect.width / GRID_SIZE;
    const cellH = rect.height / GRID_SIZE;
    
    const ghostCenterX = x;
    const ghostCenterY = y + visualOffsetY;
    
    const p = currentPieces[selectedIdx].p;
    const prs = p.length;
    const pcs = p[0].length;
    
    // Calculate the grid cell coordinates for the top-left corner of the piece
    // so that the piece's center aligns with the cursor
    const targetC = Math.round((ghostCenterX - rect.left - (pcs * cellW) / 2) / cellW);
    const targetR = Math.round((ghostCenterY - rect.top - (prs * cellH) / 2) / cellH);
    
    if(targetR >= -prs && targetR < GRID_SIZE && targetC >= -pcs && targetC < GRID_SIZE) {
      if(canPlace(p, targetR, targetC)) {
        applyPreview(p, targetR, targetC, currentPieces[selectedIdx].c);
      }
    }
  }

  function endDrag(e) {
    if(!isDragging) return;
    const x = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const y = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const visualOffsetY = e.changedTouches ? -110 : -60;
    
    const rect = gridEl.getBoundingClientRect();
    const cellW = rect.width / GRID_SIZE;
    const cellH = rect.height / GRID_SIZE;
    const p = currentPieces[selectedIdx].p;
    
    const targetC = Math.round((x - rect.left - (p[0].length * cellW) / 2) / cellW);
    const targetR = Math.round((y + visualOffsetY - rect.top - (p.length * cellH) / 2) / cellH);
    
    if(canPlace(p, targetR, targetC)) {
      placePiece(currentPieces[selectedIdx], targetR, targetC);
      playSound(200, 'sine', 0.15, 0.15, false); // Thud sound
    } else {
      streak = 0; endFever();
    }
    
    isDragging = false; ghost.style.display = 'none';
    document.querySelectorAll('.piece-box').forEach(b => b.classList.remove('dragging'));
    clearPreviews();
  }

  window.addEventListener('mousemove', updateDragPos);
  window.addEventListener('touchmove', (e) => isDragging && e.preventDefault() || updateDragPos(e), {passive:false});
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);

  function canPlace(p, r, c) {
    for(let pr=0; pr<p.length; pr++) {
      for(let pc=0; pc<p[0].length; pc++) {
        if(p[pr][pc]) {
          const tr = r + pr, tc = c + pc;
          if(tr < 0 || tc < 0 || tr >= GRID_SIZE || tc >= GRID_SIZE || grid[tr][tc]) return false;
        }
      }
    }
    return true;
  }

  function applyPreview(p, r, c, color) {
    for(let pr=0; pr<p.length; pr++) {
      for(let pc=0; pc<p[0].length; pc++) {
        if(p[pr][pc]) {
          const el = document.getElementById(`cell-${r+pr}-${c+pc}`);
          if(el) { el.style.setProperty('--cell-color', color); el.classList.add('preview'); }
        }
      }
    }
  }

  function clearPreviews() {
    document.querySelectorAll('.cell.preview').forEach(el => { el.style.background = ''; el.classList.remove('preview'); });
  }

  function placePiece(pData, r, c) {
    const p = pData.p;
    for(let pr=0; pr<p.length; pr++) {
      for(let pc=0; pc<p[0].length; pc++) {
        if(p[pr][pc]) {
          grid[r+pr][c+pc] = 1;
          const el = document.getElementById(`cell-${r+pr}-${c+pc}`);
          el.style.setProperty('--cell-color', pData.c); el.classList.add('filled');
        }
      }
    }
    score += (p.flat().filter(x=>x).length * (feverMode ? 10 : 5));
    currentPieces[selectedIdx] = null;
    document.getElementById(`piece-box-${selectedIdx}`).style.visibility = 'hidden';
    checkLines();
    updateUI();
    if(currentPieces.every(x => x === null)) spawnPieces();
    else checkGameOver();
  }

  function checkLines() {
    let rows = [], cols = [];
    for(let r=0; r<GRID_SIZE; r++) if(grid[r].every(x => x === 1)) rows.push(r);
    for(let c=0; c<GRID_SIZE; c++) {
      let f = true; for(let r=0; r<GRID_SIZE; r++) if(!grid[r][c]) f=false;
      if(f) cols.push(c);
    }
    const totalLines = rows.length + cols.length;
    if(totalLines > 0) {
      streak++;
      if(streak >= 3) startFever();
      playSound(440 + (streak * 110), 'triangle', 0.1, 0.3, false); // Pop sound
      gridEl.classList.add('screen-shake');
      setTimeout(()=>gridEl.classList.remove('screen-shake'),300);
      rows.forEach(r => { grid[r] = Array(GRID_SIZE).fill(0); for(let c=0; c<GRID_SIZE; c++) clearCell(r, c); });
      cols.forEach(c => { for(let r=0; r<GRID_SIZE; r++) { grid[r][c]=0; clearCell(r, c); } });
      const bonus = (totalLines * 100) * (feverMode ? 2 : 1);
      score += bonus;
      showCombo(bonus);
    }
  }

  function clearCell(r, c) {
    const el = document.getElementById(`cell-${r}-${c}`);
    const rect = el.getBoundingClientRect();
    createExplosion(rect.left + 20, rect.top + 20, el.style.getPropertyValue('--cell-color'));
    el.classList.add('clearing');
    setTimeout(() => { el.style.background = ''; el.classList.remove('filled', 'clearing'); }, 500);
  }

  function showCombo(pts) {
    const el = document.createElement('div');
    el.className = 'combo-popup';
    el.textContent = `+${pts}`;
    el.style.left = '50%'; el.style.top = '40%';
    document.querySelector('.game-board-container').appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  function startFever() {
    if(feverMode) return;
    feverMode = true;
    playSound(880, 'sine', 0.1, 0.6); // Rising fever sound
    document.getElementById('gameArea').classList.add('fever-active');
    document.getElementById('multiplier').style.display = 'inline';
    const alert = document.getElementById('feverAlert');
    alert.classList.add('show');
    setTimeout(() => alert.classList.remove('show'), 1000);
  }

  function endFever() {
    feverMode = false;
    document.getElementById('gameArea').classList.remove('fever-active');
    document.getElementById('multiplier').style.display = 'none';
  }

  function updateUI() {
    scoreEl.textContent = score;
    const titles = ["ROOKIE", "AMATEUR", "EDITOR", "PRO", "MASTER", "LEGEND", "GODLIKE"];
    const title = titles[Math.min(Math.floor(score / 1500), titles.length - 1)];
    document.getElementById('playerTitle').textContent = title;
  }

  function checkGameOver() {
    const rem = currentPieces.filter(x => x !== null);
    if(!rem.length) return;
    let possible = false;
    for(let pData of rem) {
      for(let r=0; r<GRID_SIZE; r++) {
        for(let c=0; c<GRID_SIZE; c++) { if(canPlace(pData.p, r, c)){ possible=true; break; } }
        if(possible) break;
      }
      if(possible) break;
    }
    if(!possible) {
      saveScore();
      const mocks = [
        "CUPU BANGET SIH!",
        "GINI DOANG KEMAMPUANMU?",
        "BELAJAR LAGI SANA, DEK!",
        "SKOR SEGINI DOANG? MALU-MALUIN!",
        "MENDING PENSIUN AJA DEH...",
        "TANGANNYA KAKU BANGET YA?",
        "HP-NYA BAGUS, MAINNYA AMPAS!",
        "YAKIN MAU MAIN LAGI? NOOB!"
      ];
      document.getElementById('mockMessage').textContent = mocks[Math.floor(Math.random() * mocks.length)];
      playSound(150, 'sawtooth', 0.2, 1.0); // Loser sound (low sawtooth)
      setTimeout(() => playSound(100, 'sawtooth', 0.2, 0.8), 200);
      
      document.getElementById('finalScoreVal').textContent = score;
      document.getElementById('finalRank').textContent = document.getElementById('playerTitle').textContent;
      document.getElementById('gameOverModal').style.display = 'flex';
    }
  }

  async function saveScore() {
    if(score < 50) return;
    await addDoc(collection(db, "leaderboard"), { playerName, score: Number(score), timestamp: new Date().toISOString() });
  }

  function initLeaderboard() {
    const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
    onSnapshot(q, snap => {
      const data = snap.docs.map((d, i) => { const item = d.data(); return `<div class="lb-item ${i<3?'top':''}"><span><strong>#${i+1}</strong> ${item.playerName}</span><span>${item.score}</span></div>`; }).join('') || '-';
      document.getElementById('lbList').innerHTML = data;
      document.getElementById('lobbyLbList').innerHTML = data;
    });
  }
</script>
</body>
</html>
