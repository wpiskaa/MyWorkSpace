<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chill Zone — Multimedia ITSpecta</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .game-section {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 100px 16px 40px;
      background: #05050f;
      touch-action: none;
    }
    .game-layout {
      display: flex; gap: 24px; width: 100%; max-width: 900px;
      flex-wrap: wrap; justify-content: center;
    }
    .game-board-container {
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column; align-items: center; gap: 15px;
    }
    .grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;
      background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px;
      width: 100%; aspect-ratio: 1/1; border: 2px solid rgba(255,255,255,0.05);
    }
    .cell {
      background: rgba(255,255,255,0.02); border-radius: 4px;
      transition: all 0.1s; position: relative;
    }
    .cell.filled { border: 1px solid rgba(255,255,255,0.2); background: var(--cell-color); }
    .cell.preview { opacity: 0.5; background: var(--cell-color); }
    .cell.clearing { transform: scale(0); opacity: 0; transition: 0.3s; }

    .piece-box {
      width: 90px; height: 90px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: grab; transition: 0.2s;
    }
    .piece-box.dragging { opacity: 0; }
    #drag-ghost { position: fixed; pointer-events: none; z-index: 5000; display: none; }

    .leaderboard-panel {
      width: 280px; background: #0a0a1a; border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .lb-header { font-weight: 800; color: var(--purple-l); font-size: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .lb-list { display: flex; flex-direction: column; gap: 8px; max-height: 350px; overflow-y: auto; }
    .lb-item { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.02); }
    .lb-item.top { background: rgba(124,58,237,0.1); border-left: 3px solid var(--purple); }

    .overlay {
      position: fixed; inset: 0; background: #05050f;
      z-index: 3000; display: flex; align-items: center; justify-content: center;
    }
    .overlay.hidden { opacity: 0; pointer-events: none; transition: 0.5s; }
    .name-card {
      background: #0a0a1a; border: 1px solid var(--border); padding: 32px;
      border-radius: 24px; text-align: center; max-width: 360px; width: 90%;
    }

    .mock-text {
      color: var(--pink-l); font-size: 24px; font-weight: 900;
      margin: 10px 0; animation: shake 0.5s infinite;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-2deg); }
      75% { transform: translateX(5px) rotate(2deg); }
    }
  </style>
</head>
<body>

<nav class="navbar scrolled">
  <div class="nav-container">
    <div class="nav-brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </div>
      <div class="brand-text"><span class="brand-name">Multimedia</span><span class="brand-org">ITSpecta</span></div>
    </div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Beranda</a></li>
      <li><a href="game.html" class="nav-link active">Game Chill</a></li>
    </ul>
    <div class="nav-actions"><a href="index.html" class="btn-secondary">Kembali</a></div>
  </div>
</nav>

<div class="overlay" id="nameOverlay">
  <div class="name-card">
    <h2 style="margin-bottom:8px">Masuk Game</h2>
    <p style="color:var(--text3); font-size:13px; margin-bottom:24px">Tantangan 6x6. Buktikan kamu yang terpintar!</p>
    <input type="text" id="playerName" class="form-input" placeholder="Namamu..." maxlength="12" style="margin-bottom:20px; text-align:center;">
    <button class="btn-primary" style="width:100%; justify-content:center" onclick="startSession()">Mulai</button>
  </div>
</div>

<section class="game-section">
  <div class="game-layout">
    <div class="game-board-container">
      <div style="display:flex; justify-content:space-between; width:100%; font-weight:800; padding:10px; background:rgba(255,255,255,0.03); border-radius:10px;">
        <div style="color:var(--purple-l)">🏆 <span id="curScore">0</span></div>
        <div style="color:var(--text3); font-size:12px">👤 <span id="dispName">-</span></div>
      </div>
      <div class="grid" id="gameGrid"></div>
      <div class="pieces-container" id="piecesRow"></div>
    </div>

    <div class="leaderboard-panel">
      <div class="lb-header">🏆 Peringkat 6x6</div>
      <div class="lb-list" id="lbList"></div>
    </div>
  </div>
</section>

<div id="drag-ghost"></div>

<div class="game-over" id="gameOverModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:5000; display:none; align-items:center; justify-content:center;">
  <div class="name-card">
    <h2 style="color:var(--pink-l); font-size:32px;">GAME OVER!</h2>
    <div id="mockMessage" class="mock-text">Yah Cupu...</div>
    <p style="margin:10px 0; font-size:20px;">Skor: <strong id="finalScoreVal">0</strong></p>
    <button class="btn-restart" onclick="location.reload()" style="width:100%; background:var(--purple); color:#fff; border:none; padding:12px; border-radius:10px; font-weight:700; cursor:pointer;">Coba Lagi</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDGnmUH1gxYKqhNEyjacmhXO5JnfbK_xD0",
    authDomain: "peoplepleasuredahsyat.firebaseapp.com",
    projectId: "peoplepleasuredahsyat",
    storageBucket: "peoplepleasuredahsyat.firebasestorage.app",
    messagingSenderId: "1013787661296",
    appId: "1:1013787661296:web:d86ea3ee22eae70f230335"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if(type === 'place') {
      osc.frequency.setValueAtTime(400, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    } else {
      osc.type = 'square'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
  }

  const GRID_SIZE = 6;
  const PIECES = [
    { p: [[1]], c: '#4f46e5' }, { p: [[1,1]], c: '#e11d48' }, { p: [[1],[1]], c: '#e11d48' },
    { p: [[1,1],[1,1]], c: '#ea580c' }, { p: [[1,1,1],[0,1,0]], c: '#059669' },
    { p: [[1,1,1]], c: '#0891b2' }, { p: [[1],[1],[1]], c: '#0891b2' },
    { p: [[1,1],[1,0]], c: '#9333ea' }, { p: [[1,1],[0,1]], c: '#c026d3' }
  ];

  let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
  let score = 0, playerName = "", currentPieces = [], selectedIdx = null;
  let isDragging = false;

  const gridEl = document.getElementById('gameGrid');
  const piecesEl = document.getElementById('piecesRow');
  const scoreEl = document.getElementById('curScore');
  const ghost = document.getElementById('drag-ghost');

  window.startSession = () => {
    const input = document.getElementById('playerName');
    if(!input.value.trim()){ alert("Isi namamu!"); return; }
    playerName = input.value.trim();
    document.getElementById('nameOverlay').classList.add('hidden');
    document.getElementById('dispName').textContent = playerName;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    initGame();
  };

  function initGame() {
    gridEl.innerHTML = '';
    for(let r=0; r<GRID_SIZE; r++) {
      for(let c=0; c<GRID_SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell'; cell.id = `cell-${r}-${c}`;
        gridEl.appendChild(cell);
      }
    }
    spawnPieces();
    initLeaderboard();
  }

  function spawnPieces() {
    currentPieces = [];
    piecesEl.innerHTML = '';
    for(let i=0; i<3; i++) {
      const pData = PIECES[Math.floor(Math.random() * PIECES.length)];
      currentPieces.push(pData);
      const box = document.createElement('div');
      box.className = 'piece-box'; box.id = `piece-box-${i}`;
      box.innerHTML = renderMiniPiece(pData.p, pData.c);
      box.addEventListener('mousedown', (e) => startDrag(e, i));
      box.addEventListener('touchstart', (e) => startDrag(e, i), {passive:false});
      piecesEl.appendChild(box);
    }
    checkGameOver();
  }

  function renderMiniPiece(p, color) {
    const rs = p.length, cs = p[0].length;
    let html = `<div style="display:grid; grid-template-columns:repeat(${cs}, 16px); gap:3px;">`;
    for(let r=0; r<rs; r++) {
      for(let c=0; c<cs; c++) html += `<div style="width:16px; height:16px; border-radius:3px; background:${p[r][c]?color:'transparent'}"></div>`;
    }
    return html + '</div>';
  }

  function startDrag(e, idx) {
    if(currentPieces[idx] === null) return;
    isDragging = true; selectedIdx = idx;
    ghost.innerHTML = renderMiniPiece(currentPieces[idx].p, currentPieces[idx].c);
    ghost.style.display = 'block';
    document.getElementById(`piece-box-${idx}`).classList.add('dragging');
    updateDragPos(e);
    if(e.type === 'touchstart') e.preventDefault();
  }

  function updateDragPos(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    ghost.style.left = (x - 40) + 'px'; ghost.style.top = (y - 40) + 'px';
    clearPreviews();
    const cell = getCellAtPos(x, y);
    if(cell && canPlace(currentPieces[selectedIdx].p, cell.r, cell.c)) applyPreview(currentPieces[selectedIdx].p, cell.r, cell.c, currentPieces[selectedIdx].c);
  }

  window.addEventListener('mousemove', (e) => isDragging && updateDragPos(e));
  window.addEventListener('touchmove', (e) => isDragging && updateDragPos(e), {passive:false});
  window.addEventListener('mouseup', endDrag); window.addEventListener('touchend', endDrag);

  function endDrag(e) {
    if(!isDragging) return;
    const x = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const y = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const cell = getCellAtPos(x, y);
    if(cell && canPlace(currentPieces[selectedIdx].p, cell.r, cell.c)) {
      placePiece(currentPieces[selectedIdx], cell.r, cell.c);
      playSound('place');
    }
    isDragging = false; ghost.style.display = 'none';
    document.querySelectorAll('.piece-box').forEach(b => b.classList.remove('dragging'));
    clearPreviews();
  }

  function getCellAtPos(x, y) {
    const el = document.elementFromPoint(x, y);
    if(el && el.classList.contains('cell')) {
      const parts = el.id.split('-');
      return { r: parseInt(parts[1]), c: parseInt(parts[2]) };
    }
    return null;
  }

  function canPlace(p, r, c) {
    for(let pr=0; pr<p.length; pr++) {
      for(let pc=0; pc<p[0].length; pc++) {
        if(p[pr][pc]) {
          const tr = r + pr, tc = c + pc;
          if(tr >= GRID_SIZE || tc >= GRID_SIZE || grid[tr][tc]) return false;
        }
      }
    }
    return true;
  }

  function applyPreview(p, r, c, color) {
    for(let pr=0; pr<p.length; pr++) {
      for(let pc=0; pc<p[0].length; pc++) {
        if(p[pr][pc]) {
          const el = document.getElementById(`cell-${r+pr}-${c+pc}`);
          if(el) { el.style.setProperty('--cell-color', color); el.classList.add('preview'); }
        }
      }
    }
  }

  function clearPreviews() {
    document.querySelectorAll('.cell.preview').forEach(el => { el.classList.remove('preview'); });
  }

  function placePiece(pData, r, c) {
    const p = pData.p;
    for(let pr=0; pr<p.length; pr++) {
      for(let pc=0; pc<p[0].length; pc++) {
        if(p[pr][pc]) {
          grid[r+pr][c+pc] = 1;
          const el = document.getElementById(`cell-${r+pr}-${c+pc}`);
          el.style.setProperty('--cell-color', pData.c); el.classList.add('filled');
        }
      }
    }
    score += (p.flat().filter(x=>x).length * 10);
    currentPieces[selectedIdx] = null;
    document.getElementById(`piece-box-${selectedIdx}`).style.visibility = 'hidden';
    checkLines();
    if(currentPieces.every(x => x === null)) spawnPieces();
    else checkGameOver();
    scoreEl.textContent = score;
  }

  function checkLines() {
    let rows = [], cols = [];
    for(let r=0; r<GRID_SIZE; r++) if(grid[r].every(x => x === 1)) rows.push(r);
    for(let c=0; c<GRID_SIZE; c++) {
      let f = true; for(let r=0; r<GRID_SIZE; r++) if(!grid[r][c]) f=false;
      if(f) cols.push(c);
    }
    if(rows.length || cols.length) {
      playSound('clear');
      rows.forEach(r => {
        grid[r] = Array(GRID_SIZE).fill(0);
        for(let c=0; c<GRID_SIZE; c++) clearCell(r, c);
      });
      cols.forEach(c => {
        for(let r=0; r<GRID_SIZE; r++) { grid[r][c]=0; clearCell(r, c); }
      });
      score += (rows.length + cols.length) * 100;
    }
  }

  function clearCell(r, c) {
    const el = document.getElementById(`cell-${r}-${c}`);
    el.classList.add('clearing');
    setTimeout(() => { el.style.background = ''; el.classList.remove('filled', 'clearing'); }, 300);
  }

  function checkGameOver() {
    const rem = currentPieces.filter(x => x !== null);
    if(!rem.length) return;
    let possible = false;
    for(let pData of rem) {
      for(let r=0; r<GRID_SIZE; r++) {
        for(let c=0; c<GRID_SIZE; c++) { if(canPlace(pData.p, r, c)){ possible=true; break; } }
        if(possible) break;
      }
      if(possible) break;
    }
    if(!possible) {
      saveScore();
      const mocks = ["Yah Cupu...", "Gitu doang?", "Mending turu dek", "Skill Issue nih", "Wkwkwk kalah", "Beban divisi!", "Coba lagi sanah"];
      document.getElementById('mockMessage').textContent = mocks[Math.floor(Math.random() * mocks.length)];
      document.getElementById('finalScoreVal').textContent = score;
      document.getElementById('gameOverModal').style.display = 'flex';
    }
  }

  async function saveScore() {
    if(score < 20) return;
    await addDoc(collection(db, "leaderboard"), { playerName, score: score + " (6x6)", timestamp: new Date().toISOString() });
  }

  function initLeaderboard() {
    const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
    onSnapshot(q, snap => {
      const list = document.getElementById('lbList');
      list.innerHTML = snap.docs.map((d, i) => {
        const data = d.data();
        return `<div class="lb-item ${i<3?'top':''}"><span><strong>#${i+1}</strong> ${data.playerName}</span><span>${data.score}</span></div>`;
      }).join('') || '<div style="text-align:center;color:var(--text3);padding:20px;">-</div>';
    });
  }
</script>
</body>
</html>
