<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chill Zone — Multimedia ITSpecta</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .game-section {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 100px 16px 40px;
      background: #030308;
      touch-action: none;
      overflow: hidden;
    }
    .game-layout {
      display: flex; gap: 24px; width: 100%; max-width: 900px;
      flex-wrap: wrap; justify-content: center;
    }
    .game-board-container {
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column; align-items: center; gap: 15px;
      position: relative;
    }
    .grid {
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;
      background: rgba(255,255,255,0.03); padding: 12px; border-radius: 16px;
      width: 100%; aspect-ratio: 1/1; border: 2px solid rgba(124,58,237,0.1);
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      position: relative; transition: transform 0.1s;
    }
    .cell {
      background: rgba(255,255,255,0.02); border-radius: 6px;
      transition: all 0.1s; position: relative;
      overflow: hidden;
    }
    .cell.filled { border: 1px solid rgba(255,255,255,0.15); box-shadow: inset 0 0 10px rgba(255,255,255,0.1); }
    .cell.preview { opacity: 0.6; transform: scale(0.95); }
    .cell.clearing { 
      animation: explode 0.5s forwards;
    }
    @keyframes explode {
      0% { transform: scale(1); filter: brightness(3); opacity: 1; }
      100% { transform: scale(0) rotate(90deg); opacity: 0; }
    }

    .pieces-container {
      display: flex; gap: 12px; width: 100%; justify-content: center; height: 110px;
    }
    .piece-box {
      width: 100px; height: 100px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: grab; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .piece-box:hover { transform: translateY(-5px); border-color: var(--purple); }
    .piece-box.dragging { opacity: 0; }
    #drag-ghost { position: fixed; pointer-events: none; z-index: 5000; display: none; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5)); }

    .leaderboard-panel {
      width: 280px; background: #0a0a1a; border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .lb-header { font-weight: 800; color: var(--purple-l); font-size: 16px; display:flex; align-items:center; gap:8px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    .lb-list { display: flex; flex-direction: column; gap: 8px; max-height: 350px; overflow-y: auto; }
    .lb-item { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 12px; border-radius: 10px; background: rgba(255,255,255,0.02); }
    .lb-item.top { background: linear-gradient(90deg, rgba(124,58,237,0.1), transparent); border-left: 3px solid var(--purple); }

    .overlay {
      position: fixed; inset: 0; background: #030308;
      z-index: 3000; display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }
    .overlay.hidden { opacity: 0; pointer-events: none; transition: 0.6s ease; }
    .name-card {
      background: #080812; border: 1px solid rgba(124,58,237,0.2); padding: 40px;
      border-radius: 32px; text-align: center; max-width: 400px; width: 90%;
      box-shadow: 0 40px 80px rgba(0,0,0,0.8);
    }

    .mock-text {
      color: var(--pink-l); font-size: 26px; font-weight: 900;
      margin: 15px 0; animation: shake 0.4s infinite;
      text-shadow: 0 0 10px var(--pink);
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px) rotate(-3deg); }
      75% { transform: translateX(6px) rotate(3deg); }
    }

    .combo-popup {
      position: absolute; color: #fff; font-weight: 900; font-size: 40px;
      text-shadow: 0 0 20px var(--purple); z-index: 1000; pointer-events: none;
      animation: popOut 0.8s ease-out forwards;
    }
    @keyframes popOut {
      0% { transform: scale(0.5); opacity: 0; }
      20% { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1) translateY(-100px); opacity: 0; }
    }

    .screen-shake { animation: shakeEffect 0.3s ease-in-out; }
    @keyframes shakeEffect {
      0%, 100% { transform: translate(0,0); }
      20% { transform: translate(-5px, 5px); }
      40% { transform: translate(5px, -5px); }
      60% { transform: translate(-5px, -5px); }
      80% { transform: translate(5px, 5px); }
    }

    /* MOBILE OPTIMIZATION */
    @media (max-width: 600px) {
      .game-section { padding: 80px 10px 20px; }
      .game-board-container { max-width: 320px; }
      .grid { gap: 4px; padding: 8px; }
      .piece-box { width: 80px; height: 80px; }
      .pieces-container { height: 90px; gap: 8px; }
      .name-card { padding: 24px; }
      .go-title { font-size: 32px !important; }
      #drag-ghost { transform: scale(1.2) translateY(-40px); } /* Offset finger for mobile */
    }
  </style>
</head>
<body>

<nav class="navbar scrolled">
  <div class="nav-container">
    <div class="nav-brand">
      <div class="brand-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </div>
      <div class="brand-text"><span class="brand-name">Multimedia</span><span class="brand-org">ITSpecta</span></div>
    </div>
    <ul class="nav-links">
      <li><a href="index.html" class="nav-link">Beranda</a></li>
      <li><a href="game.html" class="nav-link active">Game Chill</a></li>
    </ul>
    <div class="nav-actions"><a href="index.html" class="btn-secondary">Kembali</a></div>
  </div>
</nav>

<div class="overlay" id="nameOverlay">
  <div class="name-card">
    <div class="section-badge" style="margin-bottom:20px">Multimedia Challenge</div>
    <h2 style="margin-bottom:10px">Siapkan Mental!</h2>
    <p style="color:var(--text3); font-size:14px; margin-bottom:30px">Grid 6x6 dengan balok ekstrim. Bisa bertahan?</p>
    <input type="text" id="playerName" class="form-input" placeholder="Nama Hero Kamu..." maxlength="12" style="margin-bottom:24px; text-align:center; font-size:20px; font-weight:800; border-color:var(--purple);">
    <button class="btn-primary" style="width:100%; justify-content:center; padding:18px" onclick="startSession()">MASUK ARENA</button>
  </div>
</div>

<section class="game-section">
  <div class="game-layout">
    <div class="game-board-container">
      <div style="display:flex; justify-content:space-between; width:100%; font-weight:900; padding:12px 20px; background:rgba(255,255,255,0.04); border-radius:14px; border:1px solid rgba(124,58,237,0.2);">
        <div style="color:var(--purple-l)">SCORE: <span id="curScore">0</span></div>
        <div style="color:var(--pink-l)">👤 <span id="dispName">-</span></div>
      </div>
      <div class="grid" id="gameGrid"></div>
      <div class="pieces-container" id="piecesRow"></div>
    </div>

    <div class="leaderboard-panel">
      <div class="lb-header">👑 Raja Grid 6x6</div>
      <div class="lb-list" id="lbList"></div>
    </div>
  </div>
</section>

<div id="drag-ghost"></div>

<div class="game-over" id="gameOverModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.96); z-index:5000; display:none; align-items:center; justify-content:center; backdrop-filter:blur(20px);">
  <div class="name-card">
    <h2 style="color:var(--pink-l); font-size:40px; font-weight:900; letter-spacing:2px;">GAME OVER!</h2>
    <div id="mockMessage" class="mock-text">YAH CUPU...</div>
    <p style="margin:24px 0; font-size:24px; color:var(--text)">Final Score: <strong id="finalScoreVal" style="color:var(--purple-l)">0</strong></p>
    <button class="btn-restart" onclick="location.reload()" style="width:100%; background:linear-gradient(135deg, var(--purple), var(--pink)); color:#fff; border:none; padding:16px; border-radius:14px; font-weight:800; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">Coba Lagi (Lawan Malu)</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDGnmUH1gxYKqhNEyjacmhXO5JnfbK_xD0",
    authDomain: "peoplepleasuredahsyat.firebaseapp.com",
    projectId: "peoplepleasuredahsyat",
    storageBucket: "peoplepleasuredahsyat.firebasestorage.app",
    messagingSenderId: "1013787661296",
    appId: "1:1013787661296:web:d86ea3ee22eae70f230335"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- ENHANCED POWER AUDIO ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  function playPowerSound(type) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    if(type === 'place') {
      // Deep Kick + Pop
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    } else if(type === 'clear') {
      // Shimmering Blast
      for(let i=0; i<3; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = i === 0 ? 'sine' : (i === 1 ? 'square' : 'triangle');
        osc.frequency.setValueAtTime(300 + (i*200), audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200 + (i*100), audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
      }
    }
  }

  // --- GAME LOGIC ---
  const GRID_SIZE = 6;
  const PIECES = [
    { p: [[1]], c: '#4f46e5' }, { p: [[1,1]], c: '#e11d48' }, { p: [[1],[1]], c: '#e11d48' },
    { p: [[1,1],[1,1]], c: '#ea580c' }, { p: [[1,1,1],[0,1,0]], c: '#059669' },
    { p: [[1,1,1]], c: '#0891b2' }, { p: [[1],[1],[1]], c: '#0891b2' },
    { p: [[1,1],[1,0]], c: '#9333ea' }, { p: [[1,1],[0,1]], c: '#c026d3' },
    { p: [[1,1,1],[1,0,0]], c: '#2563eb' }, { p: [[1,1,1],[0,0,1]], c: '#dc2626' }, // Ekstrim L
    { p: [[1,1,1],[0,1,0],[0,1,0]], c: '#d97706' } // Big T
  ];

  let grid = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(0));
  let score = 0, playerName = "", currentPieces = [], selectedIdx = null;
  let isDragging = false;

  const gridEl = document.getElementById('gameGrid');
  const piecesEl = document.getElementById('piecesRow');
  const scoreEl = document.getElementById('curScore');
  const ghost = document.getElementById('drag-ghost');

  window.startSession = () => {
    const input = document.getElementById('playerName');
    if(!input.value.trim()){ alert("Isi namamu, jangan malu!"); return; }
    playerName = input.value.trim();
    document.getElementById('nameOverlay').classList.add('hidden');
    document.getElementById('dispName').textContent = playerName;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    initGame();
  };

  function initGame() {
    gridEl.innerHTML = '';
    for(let r=0; r<GRID_SIZE; r++) {
      for(let c=0; c<GRID_SIZE; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell'; cell.id = `cell-${r}-${c}`;
        gridEl.appendChild(cell);
      }
    }
    spawnPieces();
    initLeaderboard();
  }

  function spawnPieces() {
    currentPieces = [];
    piecesEl.innerHTML = '';
    for(let i=0; i<3; i++) {
      const pData = PIECES[Math.floor(Math.random() * PIECES.length)];
      currentPieces.push(pData);
      const box = document.createElement('div');
      box.className = 'piece-box'; box.id = `piece-box-${i}`;
      box.innerHTML = renderMiniPiece(pData.p, pData.c);
      box.addEventListener('mousedown', (e) => startDrag(e, i));
      box.addEventListener('touchstart', (e) => startDrag(e, i), {passive:false});
      piecesEl.appendChild(box);
    }
    checkGameOver();
  }

  function renderMiniPiece(p, color) {
    const rs = p.length, cs = p[0].length;
    let html = `<div style="display:grid; grid-template-columns:repeat(${cs}, 18px); gap:4px;">`;
    for(let r=0; r<rs; r++) {
      for(let c=0; c<cs; c++) html += `<div style="width:18px; height:18px; border-radius:4px; background:${p[r][c]?color:'transparent'}; box-shadow:${p[r][c]?'inset 0 0 8px rgba(255,255,255,0.3)':''}"></div>`;
    }
    return html + '</div>';
  }

  function startDrag(e, idx) {
    if(currentPieces[idx] === null) return;
    isDragging = true; selectedIdx = idx;
    ghost.innerHTML = renderMiniPiece(currentPieces[idx].p, currentPieces[idx].c);
    ghost.style.display = 'block';
    document.getElementById(`piece-box-${idx}`).classList.add('dragging');
    updateDragPos(e);
    if(e.type === 'touchstart') e.preventDefault();
  }

  function updateDragPos(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    ghost.style.left = (x - 45) + 'px'; ghost.style.top = (y - 45) + 'px';
    clearPreviews();
    // On mobile, check slightly above finger for better visibility/feel
    const checkY = e.touches ? y - 45 : y;
    const cell = getCellAtPos(x, checkY);
    if(cell && canPlace(currentPieces[selectedIdx].p, cell.r, cell.c)) applyPreview(currentPieces[selectedIdx].p, cell.r, cell.c, currentPieces[selectedIdx].c);
  }

  window.addEventListener('mousemove', (e) => isDragging && updateDragPos(e));
  window.addEventListener('touchmove', (e) => isDragging && updateDragPos(e), {passive:false});
  window.addEventListener('mouseup', endDrag); window.addEventListener('touchend', endDrag);

  function endDrag(e) {
    if(!isDragging) return;
    const x = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
    const y = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;
    const checkY = e.changedTouches ? y - 45 : y;
    const cell = getCellAtPos(x, checkY);
    if(cell && canPlace(currentPieces[selectedIdx].p, cell.r, cell.c)) {
      placePiece(currentPieces[selectedIdx], cell.r, cell.c);
      playPowerSound('place');
    }
    isDragging = false; ghost.style.display = 'none';
    document.querySelectorAll('.piece-box').forEach(b => b.classList.remove('dragging'));
    clearPreviews();
  }

  function getCellAtPos(x, y) {
    const el = document.elementFromPoint(x, y);
    if(el && el.classList.contains('cell')) {
      const parts = el.id.split('-');
      return { r: parseInt(parts[1]), c: parseInt(parts[2]) };
    }
    return null;
  }

  function canPlace(p, r, c) {
    for(let pr=0; pr<p.length; pr++) {
      for(let pc=0; pc<p[0].length; pc++) {
        if(p[pr][pc]) {
          const tr = r + pr, tc = c + pc;
          if(tr >= GRID_SIZE || tc >= GRID_SIZE || grid[tr][tc]) return false;
        }
      }
    }
    return true;
  }

  function applyPreview(p, r, c, color) {
    for(let pr=0; pr<p.length; pr++) {
      for(let pc=0; pc<p[0].length; pc++) {
        if(p[pr][pc]) {
          const el = document.getElementById(`cell-${r+pr}-${c+pc}`);
          if(el) { el.style.setProperty('--cell-color', color); el.classList.add('preview'); }
        }
      }
    }
  }

  function clearPreviews() {
    document.querySelectorAll('.cell.preview').forEach(el => { el.style.background = ''; el.classList.remove('preview'); });
  }

  function placePiece(pData, r, c) {
    const p = pData.p;
    for(let pr=0; pr<p.length; pr++) {
      for(let pc=0; pc<p[0].length; pc++) {
        if(p[pr][pc]) {
          grid[r+pr][c+pc] = 1;
          const el = document.getElementById(`cell-${r+pr}-${c+pc}`);
          el.style.setProperty('--cell-color', pData.c); el.classList.add('filled');
        }
      }
    }
    score += (p.flat().filter(x=>x).length * 10);
    currentPieces[selectedIdx] = null;
    document.getElementById(`piece-box-${selectedIdx}`).style.visibility = 'hidden';
    checkLines();
    if(currentPieces.every(x => x === null)) spawnPieces();
    else checkGameOver();
    scoreEl.textContent = score;
  }

  function checkLines() {
    let rows = [], cols = [];
    for(let r=0; r<GRID_SIZE; r++) if(grid[r].every(x => x === 1)) rows.push(r);
    for(let c=0; c<GRID_SIZE; c++) {
      let f = true; for(let r=0; r<GRID_SIZE; r++) if(!grid[r][c]) f=false;
      if(f) cols.push(c);
    }
    const totalLines = rows.length + cols.length;
    if(totalLines > 0) {
      playPowerSound('clear');
      gridEl.classList.add('screen-shake');
      setTimeout(() => gridEl.classList.remove('screen-shake'), 300);

      rows.forEach(r => {
        grid[r] = Array(GRID_SIZE).fill(0);
        for(let c=0; c<GRID_SIZE; c++) clearCell(r, c);
      });
      cols.forEach(c => {
        for(let r=0; r<GRID_SIZE; r++) { grid[r][c]=0; clearCell(r, c); }
      });
      
      // Bonus Multiplier
      const bonuses = [0, 100, 300, 700, 1500, 3000];
      const bonus = bonuses[totalLines] || (totalLines * 1000);
      score += bonus;
      showCombo(totalLines, bonus);
    }
  }

  function clearCell(r, c) {
    const el = document.getElementById(`cell-${r}-${c}`);
    el.classList.add('clearing');
    setTimeout(() => { el.style.background = ''; el.classList.remove('filled', 'clearing'); }, 500);
  }

  function showCombo(n, pts) {
    const el = document.createElement('div');
    el.className = 'combo-popup';
    el.textContent = n > 1 ? `MEGA COMBO! +${pts}` : `+${pts}`;
    el.style.left = '50%'; el.style.top = '50%';
    document.querySelector('.game-board-container').appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  function checkGameOver() {
    const rem = currentPieces.filter(x => x !== null);
    if(!rem.length) return;
    let possible = false;
    for(let pData of rem) {
      for(let r=0; r<GRID_SIZE; r++) {
        for(let c=0; c<GRID_SIZE; c++) { if(canPlace(pData.p, r, c)){ possible=true; break; } }
        if(possible) break;
      }
      if(possible) break;
    }
    if(!possible) {
      saveScore();
      const mocks = ["Yah Cupu...", "Gitu doang?", "Mending turu dek", "Skill Issue nih", "Wkwkwk kalah", "Beban divisi!", "Coba lagi sanah", "Latihan lagi dek"];
      document.getElementById('mockMessage').textContent = mocks[Math.floor(Math.random() * mocks.length)];
      document.getElementById('finalScoreVal').textContent = score;
      document.getElementById('gameOverModal').style.display = 'flex';
    }
  }

  async function saveScore() {
    if(score < 50) return;
    await addDoc(collection(db, "leaderboard"), { playerName, score: score + " (Extreme)", timestamp: new Date().toISOString() });
  }

  function initLeaderboard() {
    const q = query(collection(db, "leaderboard"), orderBy("score", "desc"), limit(10));
    onSnapshot(q, snap => {
      const list = document.getElementById('lbList');
      list.innerHTML = snap.docs.map((d, i) => {
        const data = d.data();
        return `<div class="lb-item ${i<3?'top':''}"><span><strong>#${i+1}</strong> ${data.playerName}</span><span>${data.score}</span></div>`;
      }).join('') || '<div style="text-align:center;color:var(--text3);padding:20px;">-</div>';
    });
  }
</script>
</body>
</html>
